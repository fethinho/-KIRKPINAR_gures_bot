name: KIRKPINAR Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: kirkpinar-bot
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: tggf_state.json
          key: tggf-state-v1
          restore-keys: tggf-state-v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
