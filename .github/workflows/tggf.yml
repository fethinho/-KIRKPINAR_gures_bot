name: KIRKPINAR Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: tggf_state.json
          key: state-${{ github.run_id }}
          restore-keys: state-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      # 3 kez çalıştır, araya 90 saniye koy
      - run: python tggf_bot.py
      - run: sleep 90
      - run: python tggf_bot.py
      - run: sleep 90
      - run: python tggf_bot.py
