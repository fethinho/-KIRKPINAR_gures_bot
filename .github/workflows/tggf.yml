name: KIRKPINAR Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'tggf_state.json'

concurrency:
  group: kirkpinar-bot
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
      - run: sleep 300
      - run: python tggf_bot.py
